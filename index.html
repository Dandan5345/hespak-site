<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;600;700;800&display=swap"
    rel="stylesheet" />
  <title>הספק</title>
</head>

<body>
  <div id="root"></div>
  <script>
    // Restore SPA route after a GitHub Pages 404 → redirect cycle.
    (function () {
      var params = new URLSearchParams(location.search);
      var p = params.get('p');
      if (p) {
        params.delete('p');
        var qs = params.toString();
        var base = location.pathname.replace(/\/+$/, '');
        history.replaceState(null, '', base + p + (qs ? '?' + qs : '') + location.hash);
      }
    })();
  </script>
  <script type="module" src="/src/main.tsx"></script>
</body>

</html>
