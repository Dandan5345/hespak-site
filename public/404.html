<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>הספק</title>
  <script>
    // SPA fallback for GitHub Pages. When a hard-refresh hits a route that
    // doesn't exist as a file (e.g. /hespak-site/calendar), GitHub Pages
    // serves this 404.html. We redirect to the SPA entry point, preserving
    // the original path so React Router can restore the correct view.
    (function() {
      var repo = '/hespak-site';
      var full = location.pathname + location.search + location.hash;
      // Strip the repo prefix to get the app-relative path
      var appPath = full;
      if (appPath.indexOf(repo) === 0) {
        appPath = appPath.slice(repo.length) || '/';
      }
      // Redirect to the SPA with the path as a query parameter
      sessionStorage.setItem('sf_redirect', appPath);
      location.replace(repo + '/');
    })();
  </script>
</head>
<body></body>
</html>
