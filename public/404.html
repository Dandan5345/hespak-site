<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8">
    <title>הספק</title>
    <script>
        // SPA fallback for GitHub Pages.
        // Example: /hespak-site/calendar → /hespak-site/?p=/calendar
        (function () {
            var repo = '/hespak-site';
            var path = location.pathname;
            var appPath = '/';
            if (path.indexOf(repo + '/') === 0) {
                appPath = path.slice(repo.length) || '/';
            } else if (path.indexOf(repo) === 0) {
                appPath = '/';
            }
            var q = location.search ? location.search + '&p=' + encodeURIComponent(appPath) : '?p=' + encodeURIComponent(appPath);
            location.replace(repo + '/' + q + location.hash);
        })();
    </script>
</head>

<body></body>

</html>
